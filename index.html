<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/calculadora/stylesheet.css">
</head>

<body class="container d-flex flex-column align-items-center justify-content-center">
    <div class="m-auto p-4 border bg-light rounded outline m-2 fs-2" style="width: stretch">
        <div class="d-flex  align-items-center justify-content-between">
            <a class="navbar-brand rounded" href="/">
                <img src="/img/n2-ico.jpg" width="32" class="rounded" alt="logo">oliver
            </a>
            <div class="form-check form-switch">
                <i class="fa-regular fa-moon"></i>
                <input class="form-check-input" type="checkbox" role="switch" id="darkMode" onclick="dark(this)">
                <label class="form-check-label" for="darkMode"></label>
            </div>
        </div>
        <div class="form-control bg-white">
            <input type="text" class="form-control bg-white fs-1 text-end border-0" id="digitedNumber"
                onkeydown="testa(event)" />
            <div class="result_preview text-end text-light" id="result_preview"></div>
        </div>


        <div class="buttons" style="display: grid; grid-template-columns: 3fr 1fr">
            <div>
                <div class="buttons" style="height: 16vh; display: grid; grid-template-columns: auto auto auto auto">
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">7</div>
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">8</div>
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">9</div>
                    <div class="button bg-warning text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">/</div>
                </div>
                <div class="buttons bg-light" style="height: 16vh; display: grid; grid-template-columns: auto auto auto auto">
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">4</div>
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">5</div>
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">6</div>
                    <div class="button bg-warning text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">*</div>
                </div>
                <div class="buttons bg-light" style="height: 16vh; display: grid; grid-template-columns: auto auto auto auto">
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">1</div>
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">2</div>
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">3</div>
                    <div class="button bg-warning text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">-</div>
                </div>
                <div class="buttons bg-light" style="height: 16vh; display: grid; grid-template-columns: auto auto auto auto">
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">0</div>
                    <div class="button bg-secondary text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">.</div>
                    <div class="button bg-warning text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">+</div>
                    <div class="button bg-warning text-light text-center align-content-center border rounded outline m-2"
                        style="width: stretch; height: stretch; cursor: pointer" onclick="tecla(this.innerText)">%</div>
                </div>
            </div>
            <div class="buttons bg-light" style="display: grid; grid-template-rows: 2fr 2fr">
                <div class="button bg-danger text-light text-center align-content-center border rounded outline m-2"
                    style="width: stretch; height: stretch; cursor: pointer" onclick="reset()">C</div>
                <div class="button bg-success text-light text-center align-content-center border rounded outline m-2"
                    style="width: stretch; height: stretch; cursor: pointer"
                    id="equal">=</div>
            </div>
        </div>
    </div>

    <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 1;">
        <!-- BEGIN AADS AD UNIT 2421579 -->

        <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
            <iframe data-aa='2421579' src='//acceptable.a-ads.com/2421579/?size=Adaptive'
                style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'>
            </iframe>
        </div>

        <!-- END AADS AD UNIT 2421579 -->
    </div>
    <script src="/calculadora/script.js"></script>
</body>

</html>
