<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <style>
        body {
            background-image: url(/jogos/combo-memo/components/platform/wood.jpg)
        }
        .button:hover {
            background-color: #dee1e3
        }

    </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center">
    <div class="m-auto p-4 border bg-white" style="width: stretch; height: stretch;">
        <div class="d-flex" style="height: 8vh">
            <input type="text" class="form-control bg-white fs-1 text-end" id="digitedNumber" onkeydown="testa(event)"/>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="reset()">C</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">/</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">*</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">-</div>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">7</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">8</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">9</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">+</div>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">4</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">5</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">6</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">.</div>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">1</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">2</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">3</div>
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">0</div>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="button text-center align-content-center border" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="result()">=</div>
        </div>
    </div>
    
    <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 1;">
        <!-- BEGIN AADS AD UNIT 2410752 -->

        <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
            <iframe data-aa='2410752' src='//acceptable.a-ads.com/2410752/?size=Adaptive'
            style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
        </div>

        <!-- END AADS AD UNIT 2410752 -->
    </div>
    <script>
        let numberString = "";
        let resultado = false;
        const teclasValidas = "0123456789+-*/=";
        const backspace = "Backspace";
        const enter = "Enter";
        const esc = "Escape";
        const deleteKey = "Delete";
        const arrowLeft = "ArrowLeft";
        const arrowRight = "ArrowRight";
        function testa(event) {
            if(!teclasValidas.includes(event.key) &&
                event.key != deleteKey &&
                event.key != backspace &&
                event.key != enter &&
                event.key != esc &&
                event.key != arrowLeft &&
                event.key != arrowRight) {
                event.preventDefault();
                return false;
            }
            if(event.key == enter) {
                result();
                return false;
            }
            if(event.key == esc) {
                clear();
                return false;
            }
            if(event.key != deleteKey &&
                event.key != backspace &&
                event.key != enter &&
                event.key != esc &&
                event.key != arrowLeft &&
                event.key != arrowRight) {
                if(document.getElementById("digitedNumber").value == "") {
                    numberString = "";
                }
                numberString += event.key;
            }
        }
        function tecla(numberButton) {
            numberString += numberButton;
            document.getElementById("digitedNumber").value = numberString;
            resultado = false;
        }
        function result() {
            numberString = eval(numberString)
            document.getElementById("digitedNumber").value = numberString;
            resultado = true;
        }
        function reset() {
            window.location.href = window.location.href
        }
    </script>
</body>
</html>
