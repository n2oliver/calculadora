<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <style>
        body {
            background-image: url(/jogos/combo-memo/components/platform/wood.jpg)
        }
        .button:hover {
            background-color: #dee1e3;
            color: #000;
        }
        .outline {
            outline-width: 4px;
            outline-style: outset;
            outline-offset: -4px;
        }
    </style>
</head>
<body class="container d-flex flex-column align-items-center justify-content-center">
    <div class="m-auto p-4 border bg-white rounded outline m-2 fs-2" style="width: stretch">
        <div class="d-flex  align-items-center">
            <div class="form-check form-switch">
                <i class="fa-regular fa-moon"></i>
                <input class="form-check-input" type="checkbox" role="switch" id="darkMode" onclick="dark(this)">
                <label class="form-check-label" for="darkMode"></label>
            </div>
            <input type="text" class="form-control bg-white fs-1 text-end" id="digitedNumber" onkeydown="testa(event)"/>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="reset()">C</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">/</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">*</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">-</div>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">7</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">8</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">9</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">+</div>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">4</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">5</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">6</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">%</div>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">1</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">2</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">3</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="result()">=</div>
        </div>
        <div class="d-flex buttons bg-light" style="height: 16vh">
            <div class="text-center align-content-center" 
                style="width: stretch; height: stretch"
                ></div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">0</div>
            <div class="button text-center align-content-center border rounded outline m-2" 
                style="width: stretch; height: stretch; cursor: pointer"
                onclick="tecla(this.innerText)">.</div>
            <div class="text-center align-content-center" 
                style="width: stretch; height: stretch"></div>
        </div>
    </div>
    
    <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 1;">
        <!-- BEGIN AADS AD UNIT 2421579 -->

        <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
            <iframe data-aa='2421579' src='//acceptable.a-ads.com/2421579/?size=Adaptive'
                style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'>
            </iframe>
        </div>

        <!-- END AADS AD UNIT 2421579 -->
    </div>
    <script>
        if(localStorage.darkmode == undefined || localStorage.darkmode == null) {
            localStorage.setItem("darkmode", 1);
        }
        let darkMode = false;
        let numberString = "";
        let resultado = false;
        const teclasValidas = "0123456789+-*/=%()";
        const backspace = "Backspace";
        const enter = "Enter";
        const esc = "Escape";
        const deleteKey = "Delete";
        const arrowLeft = "ArrowLeft";
        const arrowRight = "ArrowRight";
        function testa(event) {
            const newValue = document.getElementById("digitedNumber").value;
            if(!teclasValidas.includes(event.key) &&
                event.key != deleteKey &&
                event.key != backspace &&
                event.key != enter &&
                event.key != esc &&
                event.key != arrowLeft &&
                event.key != arrowRight) {
                event.preventDefault();
                return false;
            }
            if(event.key == enter || event.key == "=") {
                event.preventDefault();
                result();
                return false;
            }
            if(event.key == esc) {
                event.preventDefault();
                clear();
                return false;
            }
            
            numberString = newValue;

            if(event.key != deleteKey &&
                event.key != backspace &&
                event.key != enter &&
                event.key != esc &&
                event.key != arrowLeft &&
                event.key != arrowRight) {
                numberString += event.key;
            }
        }
        function tecla(numberButton) {
            numberString += numberButton;
            document.getElementById("digitedNumber").value = numberString;
            resultado = false;
        }
        function result() {
            numberString = eval(numberString.toString()
                .replace(/^\++|\++$/g, "")
                .replace(/^\-+|\-+$/g, "")
                .replace(/^\*+|\*+$/g, "")
                .replace(/^\/+|\/+$/g, "")
                .replace(/^\=+|\=+$/g, "")
                .replace(/^\%+|\%+$/g, "")
                .replace(/\s+/g, '')
                .replace(/([+\-*/%])\1+/g, '$1')
                .replace("%","/100")
            )
            if(!numberString) {
                numberString = '';
            }
            document.getElementById("digitedNumber").value = numberString || '';
            resultado = true;
        }
        function reset() {
            window.location.href = window.location.href
        }
        function dark(elem) {
            if(elem.checked) {
                setDark();
            } else {
                setLight();
            }
        }
        function setLight() {
            localStorage.setItem("darkmode", 0);
            for(let material of document.querySelectorAll(".bg-dark")) {
                const bgDark = document.querySelector(".bg-dark");
                if(bgDark) {
                    bgDark.classList.remove("bg-dark");
                    bgDark.classList.add("bg-white");
                    bgDark.classList.remove("text-light");
                }
                material.classList.remove("bg-dark");
                material.classList.add("bg-light");
                material.classList.remove("text-light");
            }
        }
        function setDark() {
            localStorage.setItem("darkmode", 1);
            for(let material of document.querySelectorAll(".bg-light")) {
                const bgWhite = document.querySelector(".bg-white");
                if(bgWhite) {
                    bgWhite.classList.remove("bg-white");
                    bgWhite.classList.add("bg-dark");
                    bgWhite.classList.add("text-light");
                }
                material.classList.remove("bg-light");
                material.classList.add("bg-dark");
                material.classList.add("text-light");
            }
        }
        
        if(localStorage.darkmode == 1) {
            document.getElementById("darkMode").checked = true;
            setDark();
        }
    </script>
</body>
</html>
